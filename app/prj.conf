#
# LOGGING
#
CONFIG_LOG=y
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_UART_LINE_CTRL=y

#
# ENVIRONMENTAL SENSORS
#
CONFIG_I2C=y
CONFIG_SENSOR=y

# TEMPERATURE AND HUMIDITY SENSOR
CONFIG_SHT3XD_SINGLE_SHOT_MODE=y
CONFIG_SHT3XD_TRIGGER_NONE=y
